name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy Clean State to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Xóa toàn bộ lịch sử Git cũ (Chỉ xóa trên máy ảo runner, GitHub của bạn vẫn giữ nguyên an toàn)
          rm -rf .git
          
          # 2. Khởi tạo lại một repo mới tinh với nhánh main
          git init -b main
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          # 3. Cài đặt LFS chuẩn từ đầu (chỉ track model, không track file text)
          git lfs install
          git lfs track "*.pkl"
          
          # 4. Gom toàn bộ code hiện tại thành 1 commit duy nhất sạch sẽ
          git add .
          git commit -m "🚀 Deploy clean state to Hugging Face"
          
          # 5. Khai báo máy chủ Hugging Face
          git remote add hf https://kienxs:$HF_TOKEN@huggingface.co/spaces/kienxs/Coffee-AI-Forecast
          
          # 6. Đẩy file LFS vật lý lên trước
          git lfs push hf main
          
          # 7. Ép đẩy 1 commit sạch sẽ này lên Hugging Face
          git push hf main --force

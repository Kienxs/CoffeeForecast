name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true  # ← Pull LFS content thật về

      - name: Setup Git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Convert README.md to plain text and remove LFS
        run: |
          # Cài git-lfs
          sudo apt-get install -y git-lfs
          git lfs install

          # Untrack README.md khỏi LFS
          git lfs untrack "*.md" 2>/dev/null || true
          git lfs untrack "README.md" 2>/dev/null || true

          # Xóa dòng LFS trong .gitattributes
          if [ -f .gitattributes ]; then
            grep -v "filter=lfs" .gitattributes > .gitattributes.tmp || true
            mv .gitattributes.tmp .gitattributes
          fi

          # Xóa cache LFS của README.md, re-add như file text thường
          git rm --cached README.md 2>/dev/null || true
          git add README.md

          # Commit nếu có thay đổi
          git diff --cached --quiet || git commit -m "ci: convert README.md from LFS to plain text"

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://kienxs:$HF_TOKEN@huggingface.co/spaces/kienxs/Coffee-AI-Forecast main --force
